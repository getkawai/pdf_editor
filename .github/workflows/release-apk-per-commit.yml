name: Release APK Per Commit

on:
  push:
    branches: ["*"]

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_release:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK components
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/cmake/3.22.1
            ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-androidsdk-v2-cmake-3.22.1-ndk-26.3.11579264
          restore-keys: |
            ${{ runner.os }}-androidsdk-v2-

      - name: Install NDK + CMake
        shell: bash
        run: |
          sdkmanager "ndk;26.3.11579264" "cmake;3.22.1" > /dev/null
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Resolve latest successful CI run
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            --jq '.workflow_runs
              | map(select(.event=="push"
                and (.head_branch=="main" or .head_branch=="master")
                and .conclusion=="success"))
              | first
              | .id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful CI run found on main/master"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Android APK (latest CI)
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: android-apk
          path: android-apk

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          release_name=$(git log -1 --pretty=%s)
          short_sha=$(git rev-parse --short=12 HEAD)
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=commit-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            android-apk/app-release.apk

name: Release APK Per Commit

on:
  push:
    branches: ["*"]

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_release:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      APK_VARIANT: debug # set to "release" to publish app-release.apk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest successful CI run
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            --jq '.workflow_runs
              | map(select(.conclusion=="success"))
              | first
              | .id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful CI run found on main/master"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Android APK (latest CI)
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          run_id: ${{ steps.resolve_run.outputs.run_id }}
          name: android-apk
          path: android-apk

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          release_name=$(git log -1 --pretty=%s)
          short_sha=$(git rev-parse --short=12 HEAD)
          apk_variant="${APK_VARIANT:-debug}"
          if [ "$apk_variant" = "release" ]; then
            apk_path="android-apk/app-release.apk"
          else
            apk_path="android-apk/app-debug.apk"
          fi
          if [ ! -f "$apk_path" ]; then
            echo "Expected APK not found: $apk_path"
            exit 1
          fi
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=commit-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "apk_path=${apk_path}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.meta.outputs.apk_path }}
